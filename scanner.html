<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EV ↔ CS QR Scanner</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0; padding: 20px;
      background: #121212; color: #eee;
      display: flex; flex-direction: column; align-items: center;
      height: 100vh;
      box-sizing: border-box;
    }
    #reader {
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 20px #00ff88;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #222;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      word-break: break-word;
      font-size: 1.1rem;
      white-space: pre-wrap;
      min-height: 50px;
      text-align: center;
    }
    h1 {
      font-weight: 700;
      color: #00ff88;
      text-align: center;
      margin-bottom: 0;
    }
  </style>
</head>
<body>

  <h1>Scan EV QR Code</h1>

  <div id="reader"></div>

  <div id="result">No QR code scanned yet.</div>

  <!-- html5-qrcode lib from CDN -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

  <script>
    const resultContainer = document.getElementById('result');

    function onScanSuccess(decodedText, decodedResult) {
      resultContainer.innerText = `Scanned QR Code:\n${decodedText}`;
      
      // Stop scanning after successful scan
      html5QrcodeScanner.clear().catch(error => {
        console.error('Failed to clear QR scanner.', error);
      });
    }

    function onScanFailure(error) {
      // You can log or ignore scan failures - they're normal during scanning
      // console.warn(`Scan failure: ${error}`);
    }

    const html5QrcodeScanner = new Html5Qrcode("reader");

    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrcodeScanner.start(
      { facingMode: "environment" }, // Rear camera preferred on mobile
      config,
      onScanSuccess,
      onScanFailure
    ).catch(err => {
      resultContainer.innerText = `Camera permission denied or error: ${err}`;
    });
  </script>
</body>
</html>
